name: common/pull-request CI

on:
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  dco:
    name: "DCO"
    runs-on: "ubuntu-latest"
    steps:
      - name: Check commit signoffs
        uses: actions/github-script@v8
        with:
          script: |
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const missing = commits.filter(({ commit }) => !/^Signed-off-by:\s.+$/im.test(commit.message));

            for (const { sha } of missing) {
              core.error(`Commit ${sha} is missing a Signed-off-by line`);
            }

            if (missing.length > 0) {
              core.setFailed(`${missing.length} commit(s) missing DCO signoff`);
            }

  restyled:
    name: "Restyled"
    runs-on: ubuntu-latest
    concurrency:
      group: Restyled-${{ github.ref }}
      cancel-in-progress: true
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Ensure fork is public
        if: ${{ github.event.pull_request.head.repo.private }}
        run: |
          echo "Private forks are not supported for restyling" >&2
          exit 1

      - uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: restyled-io/actions/setup@v4

      - id: restyler
        uses: restyled-io/actions/run@v4
        with:
          fail-on-differences: true

  build:
    name: "${{ matrix.name }}"
    needs: [dco, restyled]
    runs-on: "ubuntu-latest"
    concurrency:
      # Cancel running builds inside work (PR) branches, build all revisions for the main branch
      group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{ matrix.name }}
      cancel-in-progress: true
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Ubuntu 24.04 | gcc-14 | Release"
            cache_key: ubuntu-2404-gcc14-release
            image: ghcr.io/${{ github.repository_owner }}/gnuradio4-core-sdk:main-ubuntu-24.04-gcc14-release
            core_sdk_tag: main-ubuntu-24.04-gcc14-release
            cc: gcc-14
            cxx: g++-14
            cmake-build-type: Release
            cmake_flags: "-DADDRESS_SANITIZER=OFF"
          - name: "Ubuntu 26.04 | gcc | Release"
            cache_key: ubuntu-2604-gcc-release
            image: ghcr.io/${{ github.repository_owner }}/gnuradio4-core-sdk:main-ubuntu-26.04-gcc-release
            core_sdk_tag: main-ubuntu-26.04-gcc-release
            cc: gcc
            cxx: g++
            cmake-build-type: Release
            cmake_flags: "-DADDRESS_SANITIZER=OFF"
          - name: "Fedora 44 | clang | Debug"
            cache_key: fedora-44-clang-debug
            image: ghcr.io/${{ github.repository_owner }}/gnuradio4-core-sdk:main-fedora-44-clang-debug
            core_sdk_tag: main-fedora-44-clang-debug
            cc: clang
            cxx: clang++
            cmake-build-type: Debug
            cmake_flags: "-DCMAKE_CXX_FLAGS=-fsanitize=address -DCMAKE_EXE_LINKER_FLAGS=-fsanitize=address -DCMAKE_SHARED_LINKER_FLAGS=-fsanitize=address"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare sccache usage (if available)
        id: enable_sccache
        env:
          SCCACHE_S3_ENDPOINT: ${{ vars.SCCACHE_S3_ENDPOINT }}
          SCCACHE_S3_BUCKET: ${{ vars.SCCACHE_S3_BUCKET }}
          SCCACHE_S3_REGION: ${{ vars.SCCACHE_S3_REGION }}
          AWS_ACCESS_KEY_ID: ${{ vars.SCCACHE_S3_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_S3_KEY }}
        run: .github/ci-tools/setup_cmake_cache_flags.bash "${{ matrix.name }}"

      - name: Cache fetchContent
        uses: actions/cache@v5
        env:
          cache-name: cache-fetchContent-cache
        with:
          path: ${{runner.workspace}}/build/_deps
          key: fetchContent-${{ runner.os }}-${{ matrix.cache_key }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchContent-${{ runner.os }}-${{ matrix.cache_key }}

      - name: Configure
        if: matrix.cmake_wrapper == null
        shell: bash
        env:
          CC: "${{ matrix.cc }}"
          CXX: "${{ matrix.cxx }}"
        run: >
          cmake \
            -S . \
            -B ../build \
            -DCMAKE_COLOR_DIAGNOSTICS=ON \
            -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
            -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=/opt/gnuradio4 \
            ${{ steps.enable_sccache.outputs.CXX_LAUNCHER }} \
            ${{ steps.enable_sccache.outputs.C_LAUNCHER }} \
            -DENABLE_COVERAGE=OFF \
            ${{ matrix.cmake_flags }}

      - name: Build
        shell: bash
        run: cmake --build ../build

      - name: execute tests
        if: matrix.cc != 'gcc-14' || matrix.cmake-build-type != 'Debug'
        env:
          DISABLE_SENSITIVE_TESTS: 1 # disables tests which are sensitive to execution speed and will not run with instrumented code
        working-directory: ${{runner.workspace}}/build
        shell: bash
        run: ctest --output-on-failure

      - name: Show final sccache and build directory stats
        if: always()
        continue-on-error: true
        shell: bash
        run: ./.github/ci-tools/build-summary.sh "${{ matrix.name }}" "../build"
