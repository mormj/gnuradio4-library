name: cpack

on:
  schedule:
    - cron: "0 2 * * *" # Daily at 2:00 AM UTC
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  package:
    name: "Ubuntu | g++-14 | RelWithDebInfo | CPack"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository_owner }}/gnuradio4-core-sdk:main-ubuntu-24.04-gcc14-release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare sccache usage (if available)
        id: enable_sccache
        env:
          SCCACHE_S3_ENDPOINT: ${{ vars.SCCACHE_S3_ENDPOINT }}
          SCCACHE_S3_BUCKET: ${{ vars.SCCACHE_S3_BUCKET }}
          SCCACHE_S3_REGION: ${{ vars.SCCACHE_S3_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_S3_KEY }}
          AWS_ACCESS_KEY_ID: ${{ vars.SCCACHE_S3_KEY_ID }}
        run: .github/ci-tools/setup_cmake_cache_flags.bash "CPack package"

      - name: Cache fetchContent
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/build/_deps
          key: fetchContent-cpack-gcc14-relwithdebinfo-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            fetchContent-cpack-gcc14-relwithdebinfo

      - name: Configure
        shell: bash
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S . -B build \
            -DCMAKE_COLOR_DIAGNOSTICS=ON \
            -DDISABLE_EXTERNAL_DEPS_WARNINGS=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH=/opt/gnuradio4 \
            -DCPACK_PACKAGING_INSTALL_PREFIX=/opt/gnuradio4 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${{ steps.enable_sccache.outputs.CXX_LAUNCHER }} \
            ${{ steps.enable_sccache.outputs.C_LAUNCHER }} \
            -DENABLE_EXAMPLES=OFF \
            -DENABLE_TESTING=OFF \
            -DENABLE_COVERAGE=OFF \
            -DADDRESS_SANITIZER=OFF

      - name: Build CPack packages
        shell: bash
        run: cmake --build build --target package

      - name: Verify package installation
        run: sudo apt install ./build/*.deb ./build/*.ddeb -y

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-gcc14-relwithdebinfo-deb-${{ github.run_number }}
          path: |
            build/*.deb
            build/*.ddeb
          if-no-files-found: error

      - name: Show final sccache and build directory stats
        if: always()
        continue-on-error: true
        shell: bash
        run: ./.github/ci-tools/build-summary.sh "CPack package" "build/"
